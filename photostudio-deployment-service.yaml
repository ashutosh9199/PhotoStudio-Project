apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: photostudio-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6
        ports:
        - containerPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: photostudio-ns
spec:
  type: ClusterIP
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: photostudio-app
  namespace: photostudio-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: photostudio-app
  template:
    metadata:
      labels:
        app: photostudio-app
    spec:
      containers:
      - name: photostudio-app
        image: ashutosh4782/photostudio-project-app:latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
 

        # Load ConfigMap
        envFrom:
        - configMapRef:
            name: photostudio-config

        # Load Secret
        envFrom:
        - secretRef:
            name: photostudio-secret

---
apiVersion: v1
kind: Service
metadata:
  name: photostudio-service
  namespace: photostudio-ns
spec:
  type: NodePort
  selector:
    app: photostudio-app
  ports:
  - port: 3000
    targetPort: 3000
